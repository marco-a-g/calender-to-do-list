name: Rust CI (build, test, format)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  buildandtest:
    name: Gate 1 - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      
      # wichtig für WASM Target für Dioxus Frontend
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # lädt schneller
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose
        
      - name: Run tests
        run: cargo test --verbose

  formatcheck:
    name: Gate 2 - Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check Formatting
        run: cargo fmt --all -- --check
